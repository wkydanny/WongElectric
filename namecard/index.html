<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wong Electric Name Card</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="card-container">
        <!-- Front Side -->
        <div class="card card-front" id="card-front">
            <div class="front-left">
                <div class="main-logo">
                    <img src="../logo-WongElectric.png" alt="Wong Electric Logo">
                </div>
                <div class="certification-logos-vertical">
                    <img src="../logo-CMEQ.png" alt="CMEQ Logo" class="cmeq-logo">
                    <img src="../Logo-RBQ.png" alt="RBQ Logo" class="rbq-logo">
                </div>
            </div>
            <div class="front-right">
                <div class="contact-info">
                    <h1 class="name">DANNY WONG</h1>
                    <p class="title">OWNER</p>
                    <div class="info-items">
                        <div class="info-item">
                            <i class="fas fa-phone-alt"></i>
                            <span>(514) 638-3668</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-envelope"></i>
                            <span>info@wongelectric.ca</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-globe"></i>
                            <span>wongelectric.ca</span>
                        </div>
                    </div>
                    <p class="rbq-number">RBQ#: 5867-2353-01</p>
                </div>
            </div>
        </div>

        <!-- Back Side -->
        <div class="card card-back" id="card-back">
            <div class="back-content">
                <div class="top-accent"></div>
                <div class="back-main">
                    <div class="qr-section">
                        <div class="qr-wrapper">
                            <img src="../QR-WongElectric.png" alt="QR Code" class="qr-code">
                        </div>
                        <p class="qr-url">wongelectric.ca</p>
                    </div>
                    <div class="vertical-divider"></div>
                    <div class="services-section">
                        <h2 class="slogan">POWERING YOUR PROJECTS</h2>
                        <p class="sub-slogan">ELECTRICITY • RENOVATION</p>
                        <div class="services-grid">
                            <div class="service-item">
                                <div class="service-icon">
                                    <i class="fas fa-lightbulb"></i>
                                </div>
                                <p class="service-name">ELECTRICAL<br>SERVICES</p>
                            </div>
                            <div class="service-item">
                                <div class="service-icon">
                                    <i class="fas fa-house-chimney-window"></i>
                                </div>
                                <p class="service-name">RENOVATION<br>SERVICES</p>
                            </div>
                            <div class="service-item">
                                <div class="service-icon">
                                    <i class="fas fa-tools"></i>
                                </div>
                                <p class="service-name">INSTALLATION<br>& REPAIR</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bottom-accent"></div>
                <div class="footer-slogan">
                    <div class="footer-top">
                        <i class="fas fa-check-circle footer-check"></i>
                        <span>QUALITY WORK. TRUSTED SERVICE.</span>
                    </div>
                    <p class="footer-bottom">POWERING <span class="highlight">YOUR</span> PEACE OF MIND.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
