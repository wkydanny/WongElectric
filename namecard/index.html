<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wong Electric Name Card</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body><br>
    <div class="card-container">
        <!-- Front Side -->
        <div class="card card-front" id="card-front">
            <div class="front-left">
                <div class="main-logo">
                    <img src="../logo-WongElectric.png" alt="Wong Electric Logo">
                </div>
                <div class="certification-logos-vertical">
                    <img src="../logo-CMEQ.png" alt="CMEQ Logo" class="cmeq-logo">
                    <img src="../Logo-RBQ.png" alt="RBQ Logo" class="rbq-logo">
                </div>
            </div>
            <div class="front-right">
                <div class="contact-info">
                    <h1 class="name">DANNY WONG</h1>
                    <p class="title" data-i18n="card_owner">OWNER</p>
                    <div class="info-items">
                        <div class="info-item">
                            <i class="fas fa-phone-alt"></i>
                            <span>(514) 638-3668</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-envelope"></i>
                            <span>info@wongelectric.ca</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-globe"></i>
                            <span>wongelectric.ca</span>
                        </div>
                    </div>
                    <p class="rbq-number">RBQ#: 5867-2353-01</p>
                </div>
            </div>
        </div><br>

        <!-- Back Side -->
        <div class="card card-back" id="card-back">
            <div class="back-content">
                <div class="top-accent"></div>
                <div class="back-main">
                    <div class="qr-section">
                        <div class="qr-wrapper">
                            <img src="../QR-WongElectric.png" alt="QR Code" class="qr-code">
                        </div>
                        <p class="qr-url">wongelectric.ca</p>
                    </div>
                    <div class="vertical-divider"></div>
                    <div class="services-section">
                        <h2 class="slogan" data-i18n="card_slogan">POWERING YOUR PROJECTS</h2>
                        <p class="sub-slogan" data-i18n="card_sub_slogan">ELECTRICITY • RENOVATION</p>
                        <div class="services-grid">
                            <div class="service-item">
                                <div class="service-icon">
                                    <i class="fas fa-lightbulb"></i>
                                </div>
                                <p class="service-name" data-i18n="card_electrical">ELECTRICAL<br>SERVICES</p>
                            </div>
                            <div class="service-item">
                                <div class="service-icon">
                                    <i class="fas fa-house-chimney-window"></i>
                                </div>
                                <p class="service-name" data-i18n="card_renovation">RENOVATION<br>SERVICES</p>
                            </div>
                            <div class="service-item">
                                <div class="service-icon">
                                    <i class="fas fa-tools"></i>
                                </div>
                                <p class="service-name" data-i18n="card_installation">INSTALLATION<br>& REPAIR</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bottom-accent"></div>
                <div class="footer-slogan">
                    <div class="footer-top">
                        <i class="fas fa-check-circle footer-check"></i>
                        <span data-i18n="card_quality">QUALITY WORK. TRUSTED SERVICE.</span>
                    </div>
                    <p class="footer-bottom">
                        <span data-i18n="card_peace_part1">POWERING </span>
                        <span class="highlight" data-i18n="card_peace_part2">YOUR </span>
                        <span data-i18n="card_peace_part3">PEACE OF MIND.</span>
                    </p>
                </div>
            </div>
        </div>
    </div><br>

    <script>
        const translations = {
            e: {
                card_owner: "OWNER",
                card_slogan: "POWERING YOUR PROJECTS",
                card_sub_slogan: "ELECTRICITY • RENOVATION",
                card_electrical: "ELECTRICAL<br>SERVICES",
                card_renovation: "RENOVATION<br>SERVICES",
                card_installation: "INSTALLATION<br>& REPAIR",
                card_quality: "QUALITY WORK. TRUSTED SERVICE.",
                card_peace_part1: "POWERING ",
                card_peace_part2: "YOUR ",
                card_peace_part3: "PEACE OF MIND."
            },
            f: {
                card_owner: "PROPRIÉTAIRE",
                card_slogan: "PROPULSER VOS PROJETS",
                card_sub_slogan: "ÉLECTRICITÉ • RÉNOVATION",
                card_electrical: "SERVICES<br>ÉLECTRIQUES",
                card_renovation: "SERVICES DE<br>RÉNOVATION",
                card_installation: "INSTALLATION<br>ET RÉPARATION",
                card_quality: "TRAVAIL DE QUALITÉ. SERVICE FIABLE.",
                card_peace_part1: "PROPULSER ",
                card_peace_part2: "VOTRE ",
                card_peace_part3: "TRANQUILLITÉ D'ESPRIT."
            },
            c: {
                card_owner: "負責人",
                card_slogan: "為您的項目助力",
                card_sub_slogan: "電氣工程 • 裝修服務",
                card_electrical: "電氣服務",
                card_renovation: "裝修服務",
                card_installation: "安裝與維修",
                card_quality: "品質保證。誠信服務。",
                card_peace_part1: "讓您",
                card_peace_part2: "",
                card_peace_part3: "安心無憂。"
            }
        };

        function updateLanguage() {
            const params = new URLSearchParams(window.location.search);
            const lang = params.get('lang') || 'e';
            const dict = translations[lang] || translations['e'];

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) {
                    el.innerHTML = dict[key];
                }
            });
        }

        window.addEventListener('DOMContentLoaded', updateLanguage);
    </script>
</body>
</html>
